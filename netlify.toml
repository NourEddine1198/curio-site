[build]
  publish = "."

# Enable form processing for all HTML files
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Pretty URLs: /admin serves admin/index.html, /merci serves merci.html
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/merci"
  to = "/merci.html"
  status = 200
